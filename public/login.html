<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Escáner de Códigos de Barras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h1 class="title">Escáner de Códigos de Barras</h1>
            <p class="subtitle">Por favor, inicia sesión con tu cuenta de Google para continuar</p>
            <div id="login-button" class="google-login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Iniciar sesión con Google
            </div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Autenticando...</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginButton = document.getElementById('login-button');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('error-message');
            
            loginButton.addEventListener('click', function() {
                loginButton.style.display = 'none';
                loading.style.display = 'block';
                
                // Inicializar el cliente de Google
                google.accounts.id.initialize({
                    client_id: 'TU_GOOGLE_CLIENT_ID',
                    callback: handleCredentialResponse
                });
                
                // Mostrar el selector de cuentas
                google.accounts.id.prompt();
            });
            
            function handleCredentialResponse(response) {
                const token = response.credential;
                
                // Enviar el token al servidor para verificarlo
                fetch('/login/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Redirigir a la aplicación principal
                        window.location.href = '/';
                    } else {
                        throw new Error(data.message || 'Error en la autenticación');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    loading.style.display = 'none';
                    errorMessage.textContent = error.message;
                    errorMessage.style.display = 'block';
                    loginButton.style.display = 'flex';
                });
            }
        });
    </script>
</body>
</html>
