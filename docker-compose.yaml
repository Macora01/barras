version: '3.8'

services:
  barcode-scanner:
    build: .
    ports:
      # Mapea el puerto 3007 del contenedor al puerto 3007 del host/servidor
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      # Le dice a la aplicación que use el puerto 3007
      - PORT=3007
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      # El healthcheck ahora debe verificar el puerto correcto dentro del contenedor
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/api/session', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s